spring.datasource.url: jdbc:h2:file:./camunda-h2-database

camunda.bpm.admin-user:
  id: demo
  password: demo

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: camunda-workflow
      auto-offset-reset: earliest
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:file:./camunda-h2-database
    username: sa
    password:
server:
  port: 8082
camunda:
  bpm:
    history-level: full