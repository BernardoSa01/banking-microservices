spring:
  application:
    name: transaction-service
  data:
    redis:
      host: localhost
      port: 6379

  jackson:
    default-property-inclusion: non_null

kafka:
  topics:
    approved: transactions-approved
    rejected: transactions-rejected

server:
  port: 8081
  address: 0.0.0.0
  error:
    include-message: always
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always