global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "transaction-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["10.255.255.254:8081"]

  - job_name: "statement-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["10.255.255.254:8083"]

  - job_name: "notification-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["10.255.255.254:8084"]

  - job_name: "camunda-workflow"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["10.255.255.254:8082"]